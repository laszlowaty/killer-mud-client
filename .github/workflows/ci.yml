name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore MudClientStarter.sln

      - name: Build
        run: dotnet build MudClientStarter.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test MudClientStarter.sln --configuration Release --no-build --verbosity normal
