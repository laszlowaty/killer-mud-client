name: Release

on:
  workflow_dispatch:
    inputs:
      channel:
        description: 'Kanał wydania'
        required: true
        type: choice
        default: beta
        options:
          - beta
          - release
      bump:
        description: 'Podbicie wersji w Directory.Build.props'
        required: true
        type: choice
        default: patch
        options:
          - none
          - patch
          - minor
          - major

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Bump version
        id: version
        run: |
          set -euo pipefail
          CURRENT=$(sed -n 's/.*<Version>\(.*\)<\/Version>.*/\1/p' Directory.Build.props)
          echo "Current version: $CURRENT"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          case "${{ inputs.bump }}" in
            major) MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR+1)); PATCH=0 ;;
            patch) PATCH=$((PATCH+1)) ;;
            none)  ;;
          esac
          VERSION="$MAJOR.$MINOR.$PATCH"

          if [ "${{ inputs.channel }}" = "beta" ]; then
            # kolejny numer bety dla tej wersji: v1.2.3-beta.N
            N=1
            while git rev-parse -q --verify "refs/tags/v$VERSION-beta.$N" >/dev/null; do
              N=$((N+1))
            done
            FULL_VERSION="$VERSION-beta.$N"
            PRERELEASE=true
          else
            if git rev-parse -q --verify "refs/tags/v$VERSION" >/dev/null; then
              echo "::error::Tag v$VERSION już istnieje — wybierz podbicie wersji."
              exit 1
            fi
            FULL_VERSION="$VERSION"
            PRERELEASE=false
          fi

          TAG="v$FULL_VERSION"
          echo "version=$VERSION"           >> "$GITHUB_OUTPUT"
          echo "full_version=$FULL_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"                   >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE"     >> "$GITHUB_OUTPUT"
          echo "New version: $FULL_VERSION (tag $TAG)"

          if [ "$VERSION" != "$CURRENT" ]; then
            sed -i "s|<Version>$CURRENT</Version>|<Version>$VERSION</Version>|" Directory.Build.props
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add Directory.Build.props
            git commit -m "chore: bump version to $VERSION"
            if ! git push origin main; then
              LOCAL_HEAD=$(git rev-parse HEAD)
              REMOTE_HEAD=$(git ls-remote origin refs/heads/main | awk '{print $1}')
              if [ "$REMOTE_HEAD" != "$LOCAL_HEAD" ]; then
                echo "::error::Push main nie powiódł się, a origin/main wskazuje na inny commit ($REMOTE_HEAD)."
                exit 1
              fi
              echo "::notice::origin/main wskazuje już na $LOCAL_HEAD — kontynuuję wydanie."
            fi
          fi

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "KillerMudClient $FULL_VERSION"
          git push origin "$TAG"

      - name: Test
        run: dotnet test KillerMudClient.sln --configuration Release

      - name: Publish all platforms
        run: |
          set -euo pipefail
          FULL_VERSION="${{ steps.version.outputs.full_version }}"
          PROJECT="src/MudClient.App/MudClient.App.csproj"
          mkdir -p artifacts

          publish_rid() {
            local RID="$1"
            local OUT="publish/$RID"
            local NAME="KillerMudClient-$FULL_VERSION"
            dotnet publish "$PROJECT" \
              --configuration Release \
              --runtime "$RID" \
              --self-contained true \
              --output "$OUT" \
              -p:PublishSingleFile=true \
              -p:IncludeNativeLibrariesForSelfExtract=true \
              -p:IncludeAllContentForSelfExtract=true \
              -p:DebugType=None \
              -p:DebugSymbols=false \
              -p:Version="$FULL_VERSION"
            if [ -f "$OUT/MudClient.App.exe" ]; then
              mv "$OUT/MudClient.App.exe" "$OUT/$NAME.exe"
              (cd "$OUT" && zip "$GITHUB_WORKSPACE/artifacts/KillerMudClient-$FULL_VERSION-$RID.zip" "$NAME.exe")
            else
              mv "$OUT/MudClient.App" "$OUT/$NAME"
              chmod +x "$OUT/$NAME"
              tar -czf "artifacts/KillerMudClient-$FULL_VERSION-$RID.tar.gz" -C "$OUT" "$NAME"
            fi
          }

          publish_rid win-x64
          publish_rid linux-x64
          publish_rid osx-arm64
          publish_rid osx-x64

          ls -la artifacts

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${{ steps.version.outputs.tag }}"
          FULL_VERSION="${{ steps.version.outputs.full_version }}"
          FLAGS=""
          if [ "${{ steps.version.outputs.prerelease }}" = "true" ]; then
            FLAGS="--prerelease"
          fi
          gh release create "$TAG" \
            --title "KillerMudClient $FULL_VERSION" \
            --generate-notes \
            $FLAGS \
            artifacts/*

      - name: Update changelog on GitHub Pages
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${{ steps.version.outputs.tag }}"

          REPO_URL="https://github.com/${GITHUB_REPOSITORY}"

          # Wypisuje sekcję (nagłówek + lista) jeśli plik z liniami jest niepusty; escapuje HTML.
          emit_group() {
            [ -s "$2" ] || return 0
            printf '        <h3>%s</h3>\n        <ul>\n' "$1" >> docs/changelog.html
            while IFS= read -r line; do
              esc=$(printf '%s' "$line" | sed -e 's/&/\&amp;/g' -e 's/</\&lt;/g' -e 's/>/\&gt;/g')
              printf '          <li>%s</li>\n' "$esc" >> docs/changelog.html
            done < "$2"
            printf '        </ul>\n' >> docs/changelog.html
          }

          cat > docs/changelog.html <<HTML
          <!DOCTYPE html>
          <html lang="pl">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>Lista zmian — KillerMudClient</title>
            <meta name="description" content="Historia wydań klienta KillerMudClient — nowe funkcje i poprawki w kolejnych wersjach.">
            <link rel="icon" href="assets/killer.ico">
            <style>
              :root {
                --bg: #14161d; --bg-panel: #1c1f29; --border: #333a4d;
                --gold: #d9b970; --gold-bright: #f0d492; --accent: #b45de0;
                --green: #5fbf77; --text: #d6d9e0; --text-dim: #8b91a3;
                --mono: "Cascadia Code", "JetBrains Mono", Consolas, monospace;
              }
              * { margin: 0; padding: 0; box-sizing: border-box; }
              body { background: var(--bg); color: var(--text);
                font-family: "Segoe UI", system-ui, -apple-system, sans-serif; line-height: 1.6; }
              a { color: var(--gold); }
              .wrap { max-width: 860px; margin: 0 auto; padding: 0 24px; }
              header { padding: 56px 0 24px; text-align: center;
                background: radial-gradient(ellipse 70% 50% at 50% -10%, #b45de022, transparent); }
              .logo { width: 72px; height: 72px; border-radius: 16px; box-shadow: 0 8px 40px #00000080; }
              h1 { margin-top: 16px; font-size: 2rem; color: var(--gold-bright); letter-spacing: 1px; }
              h1 .kill { color: var(--accent); }
              .back { display: inline-block; margin-top: 12px; font-size: .9rem; }
              main { padding: 32px 0 8px; }
              .release { background: var(--bg-panel); border: 1px solid var(--border);
                border-radius: 12px; padding: 22px 26px; margin-bottom: 20px; }
              .release > h2 { color: var(--gold-bright); font-size: 1.3rem; display: flex;
                align-items: baseline; gap: 12px; flex-wrap: wrap; margin-bottom: 4px; }
              .release .date { color: var(--text-dim); font-size: .85rem; font-family: var(--mono); font-weight: 400; }
              .release .pre { font-size: .7rem; text-transform: uppercase; letter-spacing: 1px;
                background: #b45de022; color: var(--accent); border: 1px solid var(--accent);
                border-radius: 999px; padding: 1px 10px; font-weight: 600; }
              .notes { margin-top: 12px; }
              .notes h1, .notes h2, .notes h3 { color: var(--gold); font-size: 1.05rem;
                margin: 16px 0 6px; letter-spacing: .5px; }
              .notes ul, .notes ol { margin: 6px 0 6px 22px; }
              .notes li { color: var(--text); margin: 2px 0; }
              .notes p { color: var(--text-dim); margin: 6px 0; }
              .notes code { font-family: var(--mono); font-size: .85rem; background: #0e1016;
                border: 1px solid var(--border); border-radius: 6px; padding: 1px 6px; }
              footer { margin-top: 48px; padding: 28px 0; border-top: 1px solid var(--border);
                text-align: center; color: var(--text-dim); font-size: .88rem; }
            </style>
          </head>
          <body>
          <header>
            <div class="wrap">
              <img class="logo" src="assets/killer.png" alt="KillerMudClient logo">
              <h1><span class="kill">Killer</span>MudClient — lista zmian</h1>
              <div><a class="back" href="index.html">← powrót na stronę główną</a></div>
            </div>
          </header>
          <main class="wrap">
          HTML

          # Iteruj po tagach (najnowsze pierwsze), max 30 — lokalnie, więc bez opóźnień API
          # i z nowo utworzonym tagiem od razu widocznym.
          git for-each-ref --sort=-creatordate \
            --format='%(refname:short)|%(creatordate:short)' refs/tags | head -30 > tags.txt
          mapfile -t TAGS  < <(cut -d'|' -f1 tags.txt)
          mapfile -t DATES < <(cut -d'|' -f2 tags.txt)

          for idx in "${!TAGS[@]}"; do
            T="${TAGS[$idx]}"
            DATE="${DATES[$idx]}"
            PREV="${TAGS[$((idx + 1))]:-}"
            if [ -n "$PREV" ]; then RANGE="$PREV..$T"; else RANGE="$T"; fi

            # Subjecty commitów w zakresie: bez merge'y i bez commitów naszej automatyki.
            git log --no-merges --pretty=format:'%s' "$RANGE" 2>/dev/null \
              | grep -vE '^(chore: bump version|docs: aktualizacja listy zmian)' > all.txt || true

            # Grupowanie po prefiksie conventional-commits; prefiks jest ścinany.
            grep -iE '^feat(\(|!|:)' all.txt | sed -E 's/^feat(\([^)]*\))?!?:[[:space:]]*//I' > feat.txt  || true
            grep -iE '^fix(\(|!|:)'  all.txt | sed -E 's/^fix(\([^)]*\))?!?:[[:space:]]*//I'  > fix.txt   || true
            grep -ivE '^(feat|fix)(\(|!|:)' all.txt \
              | sed -E 's/^(chore|docs|refactor|test|style|perf|build|ci|revert)(\([^)]*\))?!?:[[:space:]]*//I' > other.txt || true

            PRE=""
            case "$T" in *-*) PRE=' <span class="pre">beta</span>' ;; esac

            cat >> docs/changelog.html <<ARTICLE
            <article class="release">
              <h2><a href="${REPO_URL}/releases/tag/${T}">${T}</a>${PRE}<span class="date">${DATE}</span></h2>
              <div class="notes">
          ARTICLE

            emit_group "✨ Nowości"          feat.txt
            emit_group "🐛 Poprawki"         fix.txt
            emit_group "🔧 Pozostałe zmiany" other.txt
            if [ ! -s feat.txt ] && [ ! -s fix.txt ] && [ ! -s other.txt ]; then
              printf '        <p class="empty">Brak istotnych zmian.</p>\n' >> docs/changelog.html
            fi
            printf '        <p class="ghlink"><a href="%s/releases/tag/%s">Szczegóły na GitHubie →</a></p>\n' \
              "$REPO_URL" "$T" >> docs/changelog.html
            printf '      </div>\n    </article>\n' >> docs/changelog.html
          done

          cat >> docs/changelog.html <<HTML
          </main>
          <footer>
            <div class="wrap">
              KillerMudClient · <a href="${REPO_URL}">github.com/${GITHUB_REPOSITORY}</a>
            </div>
          </footer>
          </body>
          </html>
          HTML

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/changelog.html
          if ! git diff --cached --quiet; then
            git commit -m "docs: aktualizacja listy zmian dla $TAG"
            git push origin main
          fi

  # Wdraża GitHub Pages w tym samym przebiegu — commit changelogu jest pushowany
  # tokenem bota, który NIE wyzwala workflow pages.yml przez trigger push.
  deploy-pages:
    needs: release
    permissions:
      contents: read
      pages: write
      id-token: write
    uses: ./.github/workflows/pages.yml
